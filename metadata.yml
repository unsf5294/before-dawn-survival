# Milestone 1 entries
GameTitle: Before the Dawn
GameBlurb: This is a fantasy, time survival game set in a medieval environment. Players will take on the role of a knight, battling the minions of the Dark Lord in the land of chaos. Unlike traditional survival games, players no longer have health points but faith points. These faith points will decrease over time and can also be eroded by the attacks of the minions. However, collecting relics or slaying the wicked can strengthen one's faith. The player's goal is to maintain their faith until dawn (5 minutes). If the faith points drop to 0, the player is deemed to have failed. Players may also obtain random skills in each round of the game to help them defeat enemies. The addition of this dice-roll-like randomness ensures that every round of the game is unique, enhancing its replayability

