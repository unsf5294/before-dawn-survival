name: PR Build Check

# Compile-only gate for pull requests: builds the WebGL player with GameCI but does
# NOT deploy. Since the project has no unit tests, a green build is the automated
# bar a branch must clear before it can be squash-merged into main.
# Reuses the same Unity license secrets as deploy-webgl.yml.

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# Cancel superseded runs on the same PR.
concurrency:
  group: pr-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL (no deploy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      # Unity version is auto-detected from ProjectSettings/ProjectVersion.txt.
      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: WebGL
          buildName: web
