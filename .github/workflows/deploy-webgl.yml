name: Build & Deploy WebGL

# Builds the game to WebGL with GameCI and publishes it to GitHub Pages.
# Requires three repository secrets: UNITY_EMAIL, UNITY_PASSWORD, UNITY_LICENSE.
# See docs/WEBGL_DEPLOYMENT.md for one-time setup instructions.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least-privilege permissions needed to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache the Library folder so subsequent builds are much faster.
      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      # Unity version is auto-detected from ProjectSettings/ProjectVersion.txt.
      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: WebGL
          buildName: web
          # Output ends up at build/WebGL/web/ (index.html + Build/ + TemplateData/).

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/WebGL/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
